name: Cloud App CI/CD

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Automated Test
        run: python test_app.py

      - name: Build Docker Image (Simulated Packaging)
        run: docker build -t cloud-app-demo .